version: '3.8'

services:
  hms-nvr:
    build: .
    image: ghcr.io/hms-homelab/hms-nvr:latest
    container_name: hms-nvr
    restart: unless-stopped

    ports:
      - "8898:8898"  # Health check endpoint

    volumes:
      - ./config/hms-nvr.yaml:/etc/hms-nvr/hms-nvr.yaml:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8898/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
